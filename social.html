<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" type="text/css" href="socials.css" />
  <script src="social-client.js" defer></script>
  <title>Social Feed</title>
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <div class="header__left">
        <h1 class="header__title">Social Feed</h1>
        <p class="header__subtitle">Thoughts, updates &amp; moments</p>
      </div>
      <div class="header__right">
        <span id="userDisplay" class="user-display"></span>
        <button id="logoutBtn" class="btn-logout">Logout</button>
      </div>
    </div>
  </header>

  <main class="main">
    <!-- Post Composer (admin only) -->
    <div class="composer" id="composer" style="display:none;">
      <div class="composer__top">
        <img id="composerAvatar" class="avatar-small" alt="Your avatar" />
        <textarea id="postContent" class="composer__textarea"
          placeholder="Share your thoughts..." maxlength="500" rows="3"></textarea>
      </div>

      <!-- Image preview -->
      <div id="imagePreview" class="composer__preview" style="display:none;">
        <img id="previewImg" alt="Selected image" />
        <button type="button" id="removeImageBtn" class="composer__remove-img" aria-label="Remove image">✕</button>
      </div>

      <div class="composer__bottom">
        <div class="composer__tools">
          <button type="button" id="attachImageBtn" class="btn-tool" title="Attach photo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            Photo
          </button>
          <input type="file" id="imageInput" accept="image/*" style="display:none">
        </div>
        <div class="composer__actions">
          <span class="char-count"><span id="charCount">0</span>/500</span>
          <button id="publishBtn" class="btn-publish" disabled>Post</button>
        </div>
      </div>
    </div>

    <!-- Feed -->
    <div id="feed" class="feed"></div>

    <div id="emptyState" class="state-msg" style="display:none;">
      <p>No posts yet.</p>
    </div>
    <div id="loadingState" class="state-msg">
      <p>Loading posts...</p>
    </div>
  </main>

  <!-- Likes modal -->
  <div id="likesModal" class="modal" hidden>
    <div class="modal__box">
      <button class="modal__close" aria-label="Close">&times;</button>
      <div class="modal__body">
        <h3>Liked by</h3>
        <div id="likesList" class="likes-list"></div>
      </div>
    </div>
  </div>

  <!-- Comments modal -->
  <div id="commentsModal" class="modal" hidden>
    <div class="modal__box">
      <button class="modal__close" aria-label="Close">&times;</button>
      <div class="modal__body">
        <h3 id="commentsTitle">Comments</h3>
        <div id="commentsList" class="comments-list"></div>
      </div>
    </div>
  </div>
</body>
</html>
