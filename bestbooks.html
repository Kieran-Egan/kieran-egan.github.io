<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="bestbooks.css">

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <script src="bestbooks.js" defer></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    defer
  ></script>

  <title>Bestbooks</title>
</head>

<body class="bg-light">

  <header class="border-bottom bg-white">
    <div class="container-fluid py-3">
      <div class="d-flex align-items-center justify-content-between gap-3 flex-wrap">
        <a href="#" class="text-decoration-none text-dark d-flex align-items-center gap-2">
          <i class="bi bi-book-half fs-3 text-primary" aria-hidden="true"></i>
          <div class="lh-sm">
            <div class="fw-bold fs-4">Bestbooks</div>
            <div class="text-muted small">The internet’s finest place to be wrong about classics.</div>
          </div>
        </a>
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <button type="button" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-bookmark-heart me-1" aria-hidden="true"></i>
            Mark as “life-changing”
          </button>

          <button type="button" class="btn btn-sm btn-primary">
            <i class="bi bi-plus-lg me-1" aria-hidden="true"></i>
            Add book (to ignore later)
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="container-fluid py-4">
    <section class="mb-5">
      <h2 class="h4 mb-3">Currently Reading</h2>
      <div id="readingGrid" class="row g-4"></div>
    </section>

    <section class="mb-5">
      <h2 class="h4 mb-3">To Read</h2>
      <div id="toReadGrid" class="row g-4"></div>
    </section>

    <section>
      <h2 class="h4 mb-3">Read</h2>
      <div id="readGrid" class="row g-4"></div>
    </section>
  </main>

</body>
</html>
