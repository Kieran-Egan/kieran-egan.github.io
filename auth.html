<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Kieran's Platform</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 40px 20px;
      text-align: center;
    }

    .card-header h1 {
      color: white;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .card-header p {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
    }

    .card-body {
      padding: 40px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid #f0f0f0;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      color: #999;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }

    .tab-btn.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .error-message {
      display: none;
      background: #fee;
      color: #c00;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      border-left: 4px solid #c00;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      display: none;
      background: #efe;
      color: #060;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      border-left: 4px solid #060;
    }

    .success-message.show {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: #667eea;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-header">
        <h1>Welcome</h1>
        <p>Kieran's Social & Books Platform</p>
      </div>

      <div class="card-body">
        <div class="tabs">
          <button class="tab-btn active" data-tab="login">Login</button>
          <button class="tab-btn" data-tab="register">Register</button>
        </div>

        <!-- Login Form -->
        <div id="login" class="tab-content active">
          <div class="error-message" id="loginError"></div>
          <div class="success-message" id="loginSuccess"></div>

          <form id="loginForm">
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="loginEmail" required placeholder="you@example.com">
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="loginPassword" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
          </form>

          <div class="loading" id="loginLoading">Logging in...</div>
        </div>

        <!-- Register Form -->
        <div id="register" class="tab-content">
          <div class="error-message" id="registerError"></div>
          <div class="success-message" id="registerSuccess"></div>

          <form id="registerForm">
            <div class="form-group">
              <label>Username</label>
              <input type="text" id="registerUsername" required placeholder="your_username">
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="registerEmail" required placeholder="you@example.com">
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="registerPassword" required placeholder="••••••••" minlength="6">
            </div>
            <div class="form-group">
              <label>Confirm Password</label>
              <input type="password" id="registerConfirm" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
          </form>

          <div class="loading" id="registerLoading">Creating account...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '';

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tabName = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(tabName).classList.add('active');
      });
    });

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      const loadingEl = document.getElementById('loginLoading');

      errorEl.classList.remove('show');
      loadingEl.style.display = 'block';

      try {
        const res = await fetch(`${API_URL}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password })
        });

        if (!res.ok) {
          throw new Error(await res.text());
        }

        const data = await res.json();
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        
        // Redirect to socials
        window.location.href = '/social.html';
      } catch (err) {
        errorEl.textContent = 'Invalid email or password';
        errorEl.classList.add('show');
      } finally {
        loadingEl.style.display = 'none';
      }
    });

    // Register
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('registerUsername').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;
      const confirm = document.getElementById('registerConfirm').value;
      const errorEl = document.getElementById('registerError');
      const loadingEl = document.getElementById('registerLoading');

      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match';
        errorEl.classList.add('show');
        return;
      }

      errorEl.classList.remove('show');
      loadingEl.style.display = 'block';

      try {
        const res = await fetch(`${API_URL}/api/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, email, password })
        });

        if (!res.ok) {
          throw new Error(await res.text());
        }

        const data = await res.json();
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        
        // Redirect to socials
        window.location.href = '/social.html';
      } catch (err) {
        errorEl.textContent = 'Registration failed. Email might already be in use.';
        errorEl.classList.add('show');
      } finally {
        loadingEl.style.display = 'none';
      }
    });
  </script>
</body>
</html>
